<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clippy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: rgba(246, 246, 246, 0.72);
    --bg-solid: #f6f6f6;
    --card: rgba(255, 255, 255, 0.85);
    --card-hover: rgba(255, 255, 255, 0.95);
    --border: rgba(0, 0, 0, 0.08);
    --text: #1d1d1f;
    --text2: #86868b;
    --accent: #007aff;
    --danger: #ff3b30;
    --glass: blur(40px) saturate(180%);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg-solid);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── Header ── */
  .header {
    padding: 12px 16px 8px;
    flex-shrink: 0;
  }

  .search-wrap {
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 15px;
    height: 15px;
    color: var(--text2);
  }

  .search-wrap input {
    width: 100%;
    padding: 8px 12px 8px 34px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    backdrop-filter: var(--glass);
    font-size: 13px;
    font-family: inherit;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.12);
  }

  .search-wrap input::placeholder { color: var(--text2); }

  /* ── List ── */
  .list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 12px 12px;
    scrollbar-width: none;
  }
  .list::-webkit-scrollbar { display: none; }

  .clip-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    margin-bottom: 4px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    position: relative;
    user-select: none;
  }

  .clip-item:hover {
    background: var(--card-hover);
    backdrop-filter: var(--glass);
  }

  .clip-item:active {
    transform: scale(0.99);
  }

  .clip-icon {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: white;
    margin-top: 1px;
  }

  .clip-icon svg {
    width: 14px;
    height: 14px;
  }

  .clip-icon.text { background: #86868b; }
  .clip-icon.code { background: #5856d6; }
  .clip-icon.url  { background: #34c759; }

.clip-body {
  flex: 1;
  min-width: 0;
  overflow: hidden;
}
.clip-text {
  font-size: 13px;
  line-height: 1.5;
  color: var(--text);
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.clip-image {
  max-width: 100%;
  max-height: 120px;
  border-radius: 8px;
  object-fit: cover;
  display: block;
}
  .clip-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    font-size: 11px;
    color: var(--text2);
  }

  .clip-actions {
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.15s;
    margin-top: 4px;
  }

  .clip-item:hover .clip-actions { opacity: 1; }

  .clip-actions button {
    background: rgba(0, 0, 0, 0.05);
    border: none;
    border-radius: 6px;
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text2);
    transition: background 0.15s, color 0.15s;
  }

  .clip-actions button:hover {
    background: rgba(0, 0, 0, 0.1);
    color: var(--text);
  }

  .clip-actions button.danger:hover {
    background: rgba(255, 59, 48, 0.12);
    color: var(--danger);
  }

  .clip-actions button svg {
    width: 13px;
    height: 13px;
  }

  .pin-badge {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 10px;
    height: 10px;
    color: var(--accent);
  }

  /* ── Footer ── */
  .footer {
    padding: 6px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--text2);
    flex-shrink: 0;
  }

  .footer kbd {
    background: rgba(0,0,0,0.06);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 10px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #34c759;
    display: inline-block;
    margin-right: 4px;
  }

  /* ── Empty ── */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text2);
    gap: 8px;
  }

  .empty svg {
    width: 40px;
    height: 40px;
    opacity: 0.3;
  }

  .empty span { font-size: 13px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="搜索剪切板…" autofocus>
    </div>
  </div>
  <div class="list" id="list"></div>
  <div class="footer">
    <span><kbd>↑↓</kbd> 选择 · <kbd>↵</kbd> 粘贴 · <kbd>⌫</kbd> 删除</span>
    <span><span class="status-dot"></span>已连接</span>
  </div>
</div>

<script>
const API = 'http://localhost:5100';
let clips = [];
let selectedIdx = -1;

const list = document.getElementById('list');
const searchInput = document.getElementById('search');

// SVG icons
const icons = {
  search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>',
  text: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
  code: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>',
  url: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>',
  pin: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 2l-4 4-6-2-4 4 6 6-5 7h2l4.5-5 6 6-1-6 6-4-2-6-4 4z"/></svg>',
  pinOutline: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 17v5"/><path d="M9 2h6l-2 6h4l-6 6 2-6H9l2-6z"/></svg>',
  copy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
  trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  clipboard: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>',
};

function detectType(content) {
  if (/^https?:\/\//i.test(content.trim())) return 'url';
  if (/[{}\[\]();]/.test(content) && /(function|const|let|var|import|class|def |fn |package|public|private|return|=>|->)/.test(content)) return 'code';
  return 'text';
}

function timeAgo(createdAt) {
  const date = new Date(createdAt);
  if (isNaN(date.getTime())) return '未知';
  const ms = Date.now() - date.getTime();
  if (ms < 60000) return '刚刚';
  if (ms < 3600000) return Math.floor(ms / 60000) + '分钟前';
  if (ms < 86400000) return Math.floor(ms / 3600000) + '小时前';
  return Math.floor(ms / 86400000) + '天前';
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const q = searchInput.value.toLowerCase();
  const filtered = clips.filter(c => !q || c.content.toLowerCase().includes(q));

  if (!filtered.length) {
    list.innerHTML = `<div class="empty">${icons.clipboard}<span>${q ? '无匹配结果' : '复制内容即出现'}</span></div>`;
    return;
  }

  list.innerHTML = filtered.map((c, i) => {
    const type = c.content_type || detectType(c.content);
    return `
      <div class="clip-item" data-idx="${i}" data-id="${c.id}" ondblclick="pasteClip(${c.id})">
        <div class="clip-icon ${type}">${icons[type] || icons.text}</div>
        <div class="clip-body">
          ${c.content_type === 'image' && c.image_path ? `<img class="clip-image" src="${API}/images/${c.image_path.split('/').pop()}" alt="截图" />` : `<div class="clip-text">${escapeHtml(c.content)}</div>`}
          <div class="clip-meta">
            <span>${timeAgo(c.created_at)}</span>
            <span>·</span>
            <span>${c.content_type === 'image' ? '图片' : c.content.length + '字'}</span>
          </div>
        </div>
        <div class="clip-actions">
          <button onclick="event.stopPropagation();copyClip(${c.id})" title="复制">${icons.copy}</button>
          <button onclick="event.stopPropagation();togglePin(${c.id},${c.pinned})" title="${c.pinned?'取消固定':'固定'}">${c.pinned ? icons.pin : icons.pinOutline}</button>
          <button class="danger" onclick="event.stopPropagation();deleteClip(${c.id})" title="删除">${icons.trash}</button>
        </div>
        ${c.pinned ? `<svg class="pin-badge" viewBox="0 0 24 24" fill="#007aff"><path d="M16 2l-4 4-6-2-4 4 6 6-5 7h2l4.5-5 6 6-1-6 6-4-2-6-4 4z"/></svg>` : ''}
      </div>`;
  }).join('');
}

// ── API ──
async function fetchClips() {
  try {
    const res = await fetch(`${API}/api/clips`);
    const data = await res.json();
    clips = (data.clips || []).sort((a, b) => {
      if (a.pinned !== b.pinned) return b.pinned - a.pinned;
      return new Date(b.created_at) - new Date(a.created_at);
    });
    render();
  } catch (e) {
    list.innerHTML = `<div class="empty">${icons.clipboard}<span>连接后端失败</span></div>`;
  }
}

async function pasteClip(id) {
  try {
    await fetch(`${API}/api/clips/${id}/copy`, { method: 'POST' });
    window.close?.();
  } catch (e) {
    const clip = clips.find(c => c.id === id);
    if (clip) { await navigator.clipboard.writeText(clip.content); }
  }
}

async function copyClip(id) {
  const clip = clips.find(c => c.id === id);
  if (clip) await navigator.clipboard.writeText(clip.content);
}

async function togglePin(id, pinned) {
  await fetch(`${API}/api/clips/${id}/pin`, { method: 'PUT' });
  fetchClips();
}

async function deleteClip(id) {
  await fetch(`${API}/api/clips/${id}`, { method: 'DELETE' });
  fetchClips();
}

// ── Keyboard ──
searchInput.addEventListener('input', render);

document.addEventListener('keydown', (e) => {
  const items = document.querySelectorAll('.clip-item');
  if (!items.length) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    selectedIdx = Math.min(selectedIdx + 1, items.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    selectedIdx = Math.max(selectedIdx - 1, 0);
  } else if (e.key === 'Enter' && selectedIdx >= 0) {
    e.preventDefault();
    pasteClip(items[selectedIdx].dataset.id);
    return;
  } else if (e.key === 'Backspace' && selectedIdx >= 0) {
    e.preventDefault();
    deleteClip(items[selectedIdx].dataset.id);
    return;
  } else {
    return;
  }

  items.forEach(el => el.style.background = '');
  if (selectedIdx >= 0 && selectedIdx < items.length) {
    items[selectedIdx].style.background = 'rgba(0,122,255,0.08)';
    items[selectedIdx].scrollIntoView({ block: 'nearest' });
  }
});

// ── Init ──
fetchClips();
setInterval(fetchClips, 2000);
</script>
</body>
</html>
